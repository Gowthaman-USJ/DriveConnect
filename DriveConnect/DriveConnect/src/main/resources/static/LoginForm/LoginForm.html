<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log In — DriveConnect</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link href="LoginForm.css" rel="stylesheet">
    </head>

    <body>
        <nav class="navbar navbar-expand-lg custom-navbar shadow-sm">
            <div class="container custom-container">
                <a class="navbar-brand" href="../IndexPage/index.html">
                    <div class="brand-name"><i class="bi bi-car-front-fill"></i> Drive<span>Connect</span></div>
                </a>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-white small me-2">New here?</span>
                    <a href="../StudentRegistration/StudentRegistration.html" class="btn btn-outline-custom btn-sm"
                        id="navRegisterLink">Sign
                        Up</a>
                </div>
            </div>
        </nav>

        <div class="login-wrapper">
            <div class="container">
                <div class="login-panel mx-auto" style="max-width: 960px;">


                    <div class="login-side">
                        <div class="login-side-content">
                            <h2 id="sideTitle">Welcome back ! </h2>

                        </div>
                    </div>

                    <div class="login-form-area">

                        <h1>Log In</h1>
                        <p class="subtitle">Enter your credentials to access your account.</p>

                        <form action="#" method="post" id="loginForm" novalidate onsubmit="login() ; return false;">
                            <input type="hidden" name="role" id="roleInput" value="student">

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="you@example.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="password-toggle">
                                    <input type="password" class="form-control" id="password" name="password"
                                        placeholder="Enter your password" required>

                                </div>
                            </div>



                            <button type="submit" class="btn custom-btn btn-lg">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Log In
                            </button>
                        </form>

                        <p class="register-link">
                            Don't have an account?
                            <a href="../StudentRegistration/StudentRegistration.html" id="registerLink">Register as a
                                Student</a><br>

                        </p>
                    </div>

                </div>
            </div>
        </div>


        <footer class="footer">
            <p class="mb-1">© 2026 <b>DriveConnect</b>. Connecting Students and Driving Schools.
        </footer>
        <script src="LoginForm.js"></script>
    </body>

</html>
