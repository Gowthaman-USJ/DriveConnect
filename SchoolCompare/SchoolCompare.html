<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DriveConnect | Find & Compare Schools</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link rel="stylesheet" href="SchoolCompare.css">

    </head>

    <body>
        <aside class="sidebar" id="sidebar">
            <div class="sb-brand">
                <div class="name"><i class="bi bi-car-front-fill"></i> Drive<span>Connect</span></div>
                <div class="role">School Finder</div>
            </div>
            <div class="sb-user">
                <div class="av">A</div>
                <div>
                    <div class="uname" id="userName"></div>
                    <div class="usub">Student · No school yet</div>
                </div>
            </div>
            <nav class="sb-nav">
                <a class="slink active" onclick="showView('browse')"><i class="bi bi-search"></i> Browse Schools</a>
            </nav>
            <div class="sb-foot">
                <a href="#"><i class="bi bi-box-arrow-right"></i> Sign out</a>
            </div>
        </aside>

        <div class="main">
            <header class="topbar">
                <button class="ib mob-tog" onclick="document.getElementById('sidebar').classList.toggle('open')"><i
                        class="bi bi-list"></i></button>
                <div>
                    <div class="tb-title" id="tbTitle">Browse Schools</div>
                </div>
                <div class="tb-right">
                    <div class="av" style="cursor:pointer" onclick="showView('profile')">A</div>
                </div>
            </header>
            <div class="pb">
                <div class="view active" id="view-browse">
                    <div class="search-hero">
                        <h5>Find your perfect driving school</h5>
                        <p>Browse 500+ verified schools · Compare side-by-side · Enrol in seconds</p>
                        <div class="search-row">
                            <input class="search-input" placeholder="🔍  School name or keyword…" id="searchQ"
                                oninput="filterCards()">
                            <select class="search-select" id="filterCity" onchange="filterCards()">
                                <option value="">All areas</option>
                            </select>
                            <select class="search-select" id="filterTx" onchange="filterCards()">
                                <option value="">Transmission</option>
                                <option>Manual</option>
                                <option>Automatic</option>
                                <option>Automatic and Manual</option>
                            </select>
                            <button class="btn-reset" onclick="resetFilters()">
                                <i class="bi bi-arrow-clockwise"></i>
                                Reset
                            </button>
                        </div>
                    </div>
                </div>
                <div class="result-header">
                    <span id="resultCount"></span>
                </div>

                <div id="schoolGrid"></div>
                <div id="dOverlay" onclick="closeDrawer()"></div>

                <div id="drawer">

                    <div class="drawer-header">
                        <h5 id="dName"></h5>

                        <button class="close-btn" onclick="closeDrawer()">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>

                    <h4 id="dName"></h4>
                    <p id="dLoc"></p>


                    <div class="drawer-tabs">
                        <button class="dtab active" onclick="switchDTab('details')">
                            Details
                        </button>

                        <button class="dtab" onclick="switchDTab('packages')">
                            Packages
                        </button>
                    </div>


                    <div id="dBody"></div>
                </div>
                <div id="paymentModal" class="payment-overlay">

                    <div class="payment-box">

                        <button class="payment-close" onclick="closePayment()">
                            <i class="bi bi-x-lg"></i>
                        </button>

                        <h4>Complete Payment</h4>

                        <p id="paymentPackage"></p>

                        <div class="payment-summary">
                            <span>Total Amount</span>
                            <b id="paymentAmount"></b>
                        </div>


                        <label>Payment Method</label>

                        <select id="paymentMethod">
                            <option>Card</option>
                            <option>Cash</option>
                        </select>


                        <button class="pay-btn" onclick="makePayment()">
                            Pay Now
                        </button>

                    </div>

                </div>
                <div id="paymentToast" class="payment-toast">

                    <i class="bi bi-check-circle-fill"></i>

                    <div>
                        <strong>Payment Successful</strong>
                        <p>Your enrollment has been confirmed.</p>

                        <button id="toastOkBtn" onclick="goStudentPortal()">
                            OK
                        </button>
                    </div>

                </div>
                <script src="SchoolCompare.js"></script>

    </body>

</html>
