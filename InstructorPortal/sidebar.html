<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Instructor Portal — DriveConnect</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link href="sidebar.css" rel="stylesheet">
        <link href="css/Instructorportal.css" rel="styleSheet">
        <link href="css/Students.css" rel="stylesheet">
        <link href="css/Schedule.css" rel="stylesheet">
        <link href="css/Attendance.css" rel="stylesheet">
    </head>

    <body>
        <div class="toast-wrap" id="toastWrap"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-name"><i class="bi bi-car-front-fill"></i> Drive<span>Connect</span></div>
                <div class="brand-role">Instructor Portal</div>
            </div>
            <div class="sidebar-instructor">
                <div class="instr-avatar" id="sidebarAvatar"></div>
                <div>
                    <div class="instr-name" id="instrName"></div>
                    <div class="instr-id" id="instrid"></div>
                    <div class="instr-school" id="instrSchool"></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="sidebar-link active" data-menu="dashboard"
                    onclick="loadPage('InstructorDashboard.html','dashboard')">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <a class="sidebar-link" data-menu="schedule" onclick="loadPage('DisplaySchedule.html','schedule')">
                    <i class=" bi bi-calendar-check"></i>Schedule
                </a>
                <a class="sidebar-link" data-menu="attendance" onclick="loadPage('ViewAttendance.html','attendance')">
                    <i class="bi bi-person-check"></i> Attendance
                </a>

                <a class="sidebar-link" data-menu="myStudents" onclick="loadPage('Students.html','myStudents')">
                    <i class="bi bi-people"></i> My Students
                </a>
                <div class="sidebar-footer">
                    <a class="nav-link text-danger px-0" href="../IndexPage/index.html">
                        <i class="bi bi-box-arrow-left"></i> Log Out
                    </a>
                </div>
            </nav>

        </aside>
        <div class="main-wrap">
            <div id="contentArea">
                <!-- pages will load here -->
            </div>
            <footer class="footer">
                <p class="mb-1">© 2026 <b>DriveConnect</b>. Connecting Students and Driving Schools.
            </footer>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="sidebar.js"></script>
        <script src="js/dashboard.js"></script>
        <script src="js/Schedule.js"></script>
        <script src="js/Students.js"></script>
        <script src="js/Attendance.js"></script>
    </body>

</html>
