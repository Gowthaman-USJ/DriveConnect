<header class="topbar">
    <div class="topbar-left">
        <button class="mob-menu-btn topbar-icon-btn"
            onclick="document.getElementById('sidebar').classList.toggle('open')">
            <i class="bi bi-list"></i>
        </button>
        <div class="topbar-icon-btn2">
            <i class="bi bi-grid-1x2"></i>
        </div>
        <div class="topbar-text">
            <div class="topbar-title" id="topbarTitle">Dashboard</div>
        </div>
    </div>
    <div class="topbar-actions">
        <div class="instr-avatar" id="topbarAvatar" style="width:36px;height:36px;font-size:0.85rem;cursor:pointer;"
            title="Profile">
        </div>
    </div>

</header>

<div class="view active" id="view-dashboard">
    <div class="page-body">
        <!-- Stats row -->
        <div class="row g-3 mb-2">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="bi bi-calendar-check"></i></div>
                    <div>
                        <div class="stat-label">Today's Lessons</div>
                        <div class="stat-value" id="todayLessons"></div>
                        <div class="stat-sub" id="completedLessons"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <div class="stat-card">
                    <div class="stat-icon orange"><i class="bi bi-people"></i></div>
                    <div>
                        <div class="stat-label">Active Students</div>
                        <div class="stat-value" id="students"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <div class="panel vehicle-panel">

                    <div class="panel-header">
                        <h6>Vehicle Assigned</h6>
                    </div>

                    <div class="panel-body">
                        <div class="d-flex align-items-center gap-3">

                            <div class="stat-icon blue" style="border-radius:12px;">
                                <i class="bi bi-car-front"></i>
                            </div>

                            <div>

                                <div id="vehicleName" style="font-size:0.9rem;font-weight:700;">
                                </div>

                                <div id="vehicleDetails" style="font-size:0.78rem;color:#6c757d;">
                                </div>

                                <div style="font-size:0.72rem;margin-top:0.2rem;">
                                    <span id="vehicleStatus" style="font-weight:600;">
                                    </span>
                                </div>

                            </div>

                        </div>
                    </div>

                </div>
            </div>

        </div>


        <div class="row g-3">
            <div class="col-lg-8">
                <div class="panel">
                    <div class="panel-header">
                        <h6><i class="bi bi-clock text-primary me-2"></i>Today's Lessons</h6>
                        <button onclick="loadPage('DisplaySchedule.html','schedule')"
                            style="background:none;border:none;font-size:0.8rem;color:var(--primary);font-weight:600;cursor:pointer;">Full
                            schedule →</button>
                    </div>
                    <div class="panel-body" id="dashLessons"></div>
                </div>
            </div>

            <!-- Right column -->
            <div class="col-lg-4">
                <!-- Quick actions -->
                <div class="panel mb-3">
                    <div class="panel-header">
                        <h6><i class="bi bi-lightning text-primary me-2"></i>Quick Actions</h6>
                    </div>
                    <div class="panel-body d-flex flex-column gap-2">
                        <button class="quick-btn" onclick="loadPage('ViewAttendance.html','attendance')"><i
                                class="bi bi-person-check"></i>
                            Mark Attendance</button>
                        <button class="quick-btn" onclick="loadPage('Students.html','students')"><i
                                class="bi bi-activity"></i> Update Status</button>
                    </div>
                </div>


            </div>
        </div>
    </div>
