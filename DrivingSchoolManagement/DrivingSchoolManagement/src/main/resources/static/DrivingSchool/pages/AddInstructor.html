<header class="topbar d-flex align-items-center justify-content-start gap-2">
    <i id="formTitleIcon" class="bi bi-person-badge text-primary fs-5"></i>
    <div class="topbar-text">
        <div class="topbar-title" id="formTitle">Add Instructor</div>
    </div>
</header>


<div class="container-fluid px-4">
    <div class="mt-4">

        <div class="dash-card">
            <div class="dash-card-header">
                Instructor Details
            </div>

            <div class="dash-card-body">

                <form id="addInstructorForm" action="#" method="post" novalidate>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name <span class="required-mark">*</span></label>
                            <input type="text" id="fname" class="form-control" placeholder="Enter instructor name"
                                required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Last Name <span class="required-mark">*</span></label>
                            <input type="text" id="lname" class="form-control" placeholder="Enter instructor name"
                                required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">NIC Number <span class="required-mark">*</span></label>
                            <input type="text" id="nic" class="form-control"
                                placeholder="e.g. 200012345678 or 991234567V" required>
                            <small class="text-muted">Sri Lankan NIC format</small>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Phone <span class="required-mark">*</span></label>
                            <input type="text" id="phone" class="form-control" placeholder="Enter phone number"
                                required>
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label for="dob" class="form-label">Date of Birth <span
                                    class="required-mark">*</span></label>
                            <input type="date" class="form-control" id="dob" name="dob" required>
                        </div>

                        <div class="col-md-6">
                            <label for="gender" class="form-label">Gender <span class="required-mark">*</span></label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="" selected>Select (optional)</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                                <option value="Prefer-not">Prefer not to say</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Address <span class="required-mark">*</span></label>
                        <input type="text" id="address" class="form-control" id="address" name="street"
                            placeholder="123 Main Street" required>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Email <span class="required-mark">*</span></label>
                        <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                    </div>


                    <div class="mt-3">
                        <label class="form-label">Password <span class="required-mark">*</span></label>
                        <input type="password" id="password" class="form-control" placeholder="Create login password"
                            required>
                    </div>


                    <div class="mt-3">
                        <div class="col-md-6">
                            <label class="form-label">License Type <span class="required-mark">*</span></label>

                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="motorcycle" name="licenseType[]"
                                        value="Motorcycle">
                                    <label class="form-check-label" for="motorcycle">
                                        Motorcycle
                                    </label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="lightVehicle"
                                        name="licenseType[]" value="Light Vehicle">
                                    <label class="form-check-label" for="lightVehicle">
                                        Light Vehicle
                                    </label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="heavyVehicle"
                                        name="licenseType[]" value="Heavy Vehicle">
                                    <label class="form-check-label" for="heavyVehicle">
                                        Heavy Vehicle
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Experience (Years) <span class="required-mark">*</span></label>
                        <input type="number" id="experience" class="form-control" placeholder="e.g. 5" required>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Availability <span class="required-mark">*</span></label>
                        <select class="form-select" id="availability">
                            <option value="" selected>Select (optional)</option>
                            <option value="FullTime">Full Time</option>
                            <option value="PartTime">Part Time</option>
                            <option value="Weekend">Weekend Only</option>
                        </select>
                    </div>


                    <div class="d-flex justify-content-between align-items-center mt-4">

                        <a href="#" onclick="loadPage('DisplayInstructors.html','instructors')"
                            class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i> Back to Instructors
                        </a>

                        <button type="submit" class="btn btn-primary px-4">
                            <i id="submitIcon" class="bi bi-person-plus me-2"></i>
                            <span id="submitText">Add Instructor</span>
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </div>

</div>
