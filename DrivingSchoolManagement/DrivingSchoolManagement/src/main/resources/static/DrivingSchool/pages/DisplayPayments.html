<header class="topbar">

    <div class="topbar-left">

        <button class="mob-menu-btn topbar-icon-btn d-lg-none"
            onclick="document.getElementById('sidebar').classList.toggle('open')">
            <i class="bi bi-list"></i>
        </button>

        <div class="topbar-icon-btn">
            <i class="bi bi-credit-card"></i>
        </div>

        <div class="topbar-text">
            <div class="topbar-title" id="topbarTitle">Payments</div>
            <small class="text-muted">Manage all student payments</small>
        </div>
    </div>

    <div class="d-flex gap-2 justify-content-start">

        <a onclick="loadPage('AddPayment.html','payments')" class=" btn btn-primary d-flex align-items-center
            gap-2">
            <i class="bi bi-plus-circle"></i>
            Add Payment
        </a>
    </div>
</header>
<div class="page-body">
    <div class="container-fluid px-4">
        <div class="row g-3 mb-3">

            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h6>Total Revenue</h6>
                    <h3 id="totalRevenue">LKR </h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h6>Paid</h6>
                    <h3 class="text-success" id="paidRevenue">LKR </h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h6>Pending</h6>
                    <h3 class="text-danger" id="pendingRevenue">LKR </h3>
                </div>
            </div>

        </div>
        <div class="card-table" style="margin-top: 20px;">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light">
                        <tr>
                            <th>Payment ID</th>
                            <th>Student ID</th>
                            <th>Student Name</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Method</th>
                        </tr>
                    </thead>

                    <tbody id="paymentTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>
</div>

<div class="modal fade" id="deletePaymentModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header border-0">
                <h5 class="modal-title text-danger">
                    <i class="bi bi-trash-fill me-2"></i>
                    Delete Payment
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <i class="bi bi-exclamation-triangle-fill text-warning fs-1"></i>

                <h5 class="mt-3">Are you sure?</h5>

                <p class="text-muted">
                    This payment will be permanently deleted.
                </p>
            </div>

            <div class="modal-footer border-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-danger" onclick="confirmDelete()">
                    Delete
                </button>
            </div>

        </div>
    </div>
</div>
