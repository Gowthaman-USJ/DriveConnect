<header class="topbar d-flex align-items-center justify-content-start gap-2">
    <i id="formTitleIcon" class="bi bi-pencil-square me-2 text-primary fs-5"></i>
    <div class="topbar-text">
        <div class="topbar-title" id="formTitle">
            Update Student
        </div>
    </div>
</header>

<div class="container-fluid px-4">
    <div class="mt-4">

        <div class="dash-card">

            <div class="dash-card-header">
                Student Details
            </div>

            <div class="dash-card-body">

                <form id="editStudentForm" action="#" method="post" novalidate>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="firstName" class="form-label">First Name <span
                                    class="required-mark">*</span></label>
                            <input type="text" class="form-control" id="firstName" name="firstName" placeholder="John"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">Last Name <span
                                    class="required-mark">*</span></label>
                            <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Smith"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">NIC <span class="required-mark">*</span></label>
                            <input type="nic" class="form-control" id="nic" name="nic" placeholder="200416100340"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email Address <span
                                    class="required-mark">*</span></label>
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="john@example.com" required>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone Number <span
                                    class="required-mark">*</span></label>
                            <input type="tel" class="form-control" id="phone" name="phone"
                                placeholder="+1 (555) 123-4567" required>
                        </div>
                        <div class="col-md-6">
                            <label for="dob" class="form-label">Date of Birth <span
                                    class="required-mark">*</span></label>
                            <input type="date" class="form-control" id="dob" name="dob" required>
                        </div>
                        <div class="col-md-6">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="" selected>Select (optional)</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="other">Other</option>
                                <option value="prefer-not">Prefer not to say</option>
                            </select>
                        </div>
                    </div>

                    <hr class="my-4">
                    <h5>Address</h5>
                    <div class="row g-3">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="street" class="form-label">Street Address <span
                                        class="required-mark">*</span></label>
                                <input type="text" class="form-control" id="street" name="street"
                                    placeholder="123 Main Street" required>
                            </div>
                            <div class="col-md-5">
                                <label for="city" class="form-label">City <span class="required-mark">*</span></label>
                                <input type="text" class="form-control" id="city" name="city" placeholder="Springfield"
                                    required>
                            </div>
                            <div class="col-md-4">
                                <label for="state" class="form-label">State / Province <span
                                        class="required-mark">*</span></label>
                                <input type="text" class="form-control" id="state" name="state" placeholder="California"
                                    required>
                            </div>
                            <div class="col-md-3">
                                <label for="zip" class="form-label">ZIP / Postal Code <span
                                        class="required-mark">*</span></label>
                                <input type="text" class="form-control" id="zip" name="zip" placeholder="90210"
                                    required>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">
                    <h5>Driving Preferences</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">License Type <span class="required-mark">*</span></label>

                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="motorcycle" name="licenseType"
                                        value="Motorcycle">
                                    <label class="form-check-label" for="motorcycle">
                                        Motorcycle
                                    </label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="lightVehicle" name="licenseType"
                                        value="LightVehicle">
                                    <label class="form-check-label" for="lightVehicle">
                                        Light Vehicle
                                    </label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="heavyVehicle" name="licenseType"
                                        value="HeavyVehicle">
                                    <label class="form-check-label" for="heavyVehicle">
                                        Heavy Vehicle
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="transmission" class="form-label">Transmission Preference <span
                                    class="required-mark">*</span></label>
                            <select class="form-select" id="transmission" name="transmission" required>
                                <option value="" selected disabled>Select transmission</option>
                                <option value="Automatic">Automatic</option>
                                <option value="Manual">Manual</option>
                                <option value="both">No preference</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="experience" class="form-label">Driving Experience <span
                                    class="required-mark">*</span></label>
                            <select class="form-select" id="experience" name="experience" required>
                                <option value="" selected disabled>Select experience level</option>
                                <option value="C_Beginner">Complete beginner — never driven</option>
                                <option value="S_Experience">Some experience — practiced with family</option>
                                <option value="Intermediate">Intermediate — comfortable basics</option>
                                <option value="Advanced">Advanced — preparing for test</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="lessonTime" class="form-label">Preferred Lesson Times</label>
                            <select class="form-select" id="lessonTime" name="lessonTime">
                                <option value="AnyTime" selected>Any time</option>
                                <option value="Mrng">Morning (8 AM – 12 PM)</option>
                                <option value="Afternoon">Afternoon (12 PM – 5 PM)</option>
                                <option value="Evening">Evening (5 PM – 8 PM)</option>
                                <option value="Weekends">Weekends only</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Additional Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"
                                placeholder="Any special requirements, medical conditions, or preferences we should know about..."></textarea>
                        </div>
                    </div>

                    <hr class="my-4">
                    <label for="password" class="form-label">
                        Password
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Leave blank to keep current password">
                    <div class="input-hint">
                        Leave blank to keep the current password.
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4">

                        <a href="#" onclick="loadPage('DisplayStudents.html','students'); return false;"
                            class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>
                            Back to Students
                        </a>

                        <button type="submit" class="btn btn-primary px-4">
                            <i id="submitIcon" class="bi bi-pencil-square me-1"></i>
                            <span id="submitText">Update Student</span>
                        </button>

                    </div>
                </form>
            </div>

        </div>
    </div>

</div>
