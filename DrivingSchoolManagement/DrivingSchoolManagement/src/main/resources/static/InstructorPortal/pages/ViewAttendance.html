<header class="topbar">
    <div class="topbar-left">
        <button class="mob-menu-btn topbar-icon-btn"
            onclick="document.getElementById('sidebar').classList.toggle('open')">
            <i class="bi bi-list"></i>
        </button>
        <div class="topbar-icon-btn2">
            <i class="bi-person-check"></i>
        </div>
        <div class="topbar-text">
            <div class="topbar-title" id="topbarTitle">View Attendance</div>
        </div>
    </div>

</header>



<div class="view active" id="view-attendance">
    <div class="page-body">
        <div class="panel">
            <div class="panel-header">
                <h6><i class="bi bi-person-check text-primary me-2"></i>Mark Attendance — <span
                        id="attendanceDate"></span></h6>
            </div>
            <div class="panel-body p-0">
                <table class="roster-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Time Slot</th>
                            <th>Lesson #</th>
                            <th>Package</th>
                            <th>Attendance</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="AttendanceTableBody">

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3">

    <div id="statusToast" class="toast text-bg-success border-0 compact-toast" role="alert">

        <div class="d-flex align-items-center">

            <div class="toast-body py-2 px-3" id="toastBody">
                <i class="bi bi-check-circle-fill me-1"></i>
                Attendance Updated Successfully!
            </div>

            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
            </button>

        </div>

    </div>

</div>
